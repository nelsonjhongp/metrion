<svg width="640" height="160" viewBox="0 0 640 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Metrion logo</title>
  <desc id="desc">Minimal wordmark logo for Metrion, a monthly financial control app.</desc>
  <rect width="640" height="160" fill="transparent"/>

  <!-- Icon container -->
  <rect x="32" y="32" width="96" height="96" rx="24" fill="#047857"/>
  <rect x="32" y="32" width="96" height="96" rx="24" fill="url(#iconGlow)" fill-opacity="0.24"/>

  <!-- Document shape -->
  <path d="M62 54H91L108 71V106C108 111.523 103.523 116 98 116H62C56.477 116 52 111.523 52 106V64C52 58.477 56.477 54 62 54Z" fill="white" fill-opacity="0.92"/>
  <path d="M91 54V68C91 69.657 92.343 71 94 71H108" stroke="#047857" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Metric bars -->
  <rect x="62" y="88" width="8" height="12" rx="2" fill="#047857"/>
  <rect x="76" y="80" width="8" height="20" rx="2" fill="#047857"/>
  <rect x="90" y="72" width="8" height="28" rx="2" fill="#047857"/>

  <!-- Sol marker -->
  <circle cx="101" cy="101" r="17" fill="#D1FAE5" stroke="#047857" stroke-width="4"/>
  <text x="101" y="107" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#047857">S/</text>

  <!-- Wordmark -->
  <text x="152" y="91" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#071226">Metrion</text>
  <text x="156" y="116" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#64748B">control mensual</text>

  <defs>
    <linearGradient id="iconGlow" x1="32" y1="32" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D1FAE5"/>
      <stop offset="1" stop-color="#047857" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
